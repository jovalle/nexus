# Traefik Dynamic Configuration
# docker/traefik/dynamic.yaml:/etc/traefik/dynamic.yaml
# This file is watched for changes and automatically reloaded by Traefik
# Add your external services here that aren't managed by Docker
#
# DEFAULTS:
# - HTTP redirects are handled in this file via routers/middleware on web entrypoint
# - All HTTPS traffic gets "internal" middleware by default (websecure entrypoint)
# - To expose a service to the internet, explicitly use "external@file" middleware

http:
  # ===========================================
  # MIDDLEWARES
  #
  # Note: "internal" middleware is applied by default via entrypoint
  # Only specify middlewares when overriding (e.g., basic-auth)
  # ===========================================
  middlewares:
    # -------------------------------------------------------------------------
    # auth - Authelia ForwardAuth Middleware (Standard)
    # -------------------------------------------------------------------------
    # Delegates authentication to Authelia for 2FA.
    # -------------------------------------------------------------------------
    auth:
      forwardAuth:
        address: http://100.100.1.1:9091/api/authz/forward-auth
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Email
          - Remote-Name

    # -------------------------------------------------------------------------
    # basic-auth - Authelia ForwardAuth with Basic Auth Support (1FA)
    # -------------------------------------------------------------------------
    # Same as authelia middleware but with authelia_url parameter.
    # This is used for 1FA authentication (password only).
    # -------------------------------------------------------------------------
    basic-auth:
      forwardAuth:
        address: 'http://100.100.1.1:9091/api/authz/forward-auth?authelia_url=https://auth.{{ env "DOMAIN" }}'
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Email
          - Remote-Name

    # -------------------------------------------------------------------------
    # proxy-loop - Prevent fallback proxy loops between Nexus and Mothership
    # -------------------------------------------------------------------------
    proxy-loop:
      headers:
        customRequestHeaders:
          X-Proxy-Loop: "nexus"

    # -------------------------------------------------------------------------
    # redirect-https - Redirect plain HTTP to HTTPS
    # -------------------------------------------------------------------------
    redirect-https:
      redirectScheme:
        scheme: https
        permanent: true

    # -------------------------------------------------------------------------
    # short-host-to-go - Canonicalize short hostnames to go.<domain>/<host>
    # -------------------------------------------------------------------------
    short-host-to-go:
      redirectRegex:
        regex: '^https?://([a-z0-9-]+)(?::[0-9]+)?(/.*)?$'
        replacement: 'https://go.{{ env "DOMAIN" }}/${1}${2}'
        permanent: false

  # ===========================================
  # ROUTERS
  # ===========================================
  routers:
    auth:
      rule: 'Host(`auth.{{ env "DOMAIN" }}`)'
      service: "authelia"
    console:
      rule: 'Host(`console.nexus.{{ env "DOMAIN" }}`)'
      service: "console"
    gateway:
      rule: 'Host(`gateway.{{ env "DOMAIN" }}`) || Host(`warpgate.{{ env "DOMAIN" }}`)'
      service: "gateway"
    gatus:
      rule: 'Host(`gatus.{{ env "DOMAIN" }}`) || Host(`status.{{ env "DOMAIN" }}`)'
      service: "gatus"
    goku:
      rule: 'Host(`go.{{ env "DOMAIN" }}`)'
      service: "goku"
    goku-short-host:
      rule: 'Host(`go`)'
      service: "goku"
      tls:
        options: short-host@file
    goku-short-slug:
      entryPoints:
        - golinks
      rule: 'HostRegexp(`^[a-z0-9-]+$`) && !Host(`go`)'
      middlewares:
        - short-host-to-go
      service: noop@internal
    goku-short-slug-web:
      entryPoints:
        - web
      rule: 'HostRegexp(`^[a-z0-9-]+$`) && !Host(`go`)'
      priority: 1000
      middlewares:
        - short-host-to-go
      service: noop@internal
    web-redirect:
      entryPoints:
        - web
      rule: 'HostRegexp(`^.+$`)'
      priority: 1
      middlewares:
        - redirect-https
      service: noop@internal
    proxmox:
      rule: 'Host(`proxmox.{{ env "DOMAIN" }}`) || Host(`pve.{{ env "DOMAIN" }}`)'
      service: "proxmox"
    truenas:
      rule: 'Host(`truenas.{{ env "DOMAIN" }}`) || Host(`nexus.{{ env "DOMAIN" }}`)'
      service: "truenas"

    # -------------------------------------------------------------------------
    # Cross-proxy fallback routers (Nexus -> Mothership)
    # -------------------------------------------------------------------------
    mothership-fallback:
      entryPoints:
        - websecure
      rule: 'HostRegexp(`^[a-z0-9-]+\.{{ env "DOMAIN" }}$`) && !HeaderRegexp(`X-Proxy-Loop`, `.+`)'
      priority: 1
      middlewares:
        - proxy-loop
      service: mothership-backend
      tls:
        certResolver: letsencrypt

    mothership-fallback-sub:
      entryPoints:
        - websecure
      rule: 'HostRegexp(`^[a-z0-9-]+\.[a-z0-9-]+\.{{ env "DOMAIN" }}$`) && !HeaderRegexp(`X-Proxy-Loop`, `.+`)'
      priority: 1
      middlewares:
        - proxy-loop
      service: mothership-backend
      tls:
        certResolver: letsencrypt

  # ===========================================
  # SERVICES
  # ===========================================
  services:
    authelia:
      loadBalancer:
        servers:
          - url: "http://100.100.1.1:9091"
    console:
      loadBalancer:
        servers:
          - url: "https://192.168.1.33"
    gateway:
      loadBalancer:
        servers:
          - url: "https://192.168.1.1"
    gatus:
      loadBalancer:
        servers:
          - url: "http://100.100.1.1:8181"
    goku:
      loadBalancer:
        servers:
          - url: "http://goku:9001"
    proxmox:
      loadBalancer:
        servers:
          - url: "https://192.168.10.10:8006"
    truenas:
      loadBalancer:
        servers:
          - url: "https://192.168.1.2:8443"

    mothership-backend:
      loadBalancer:
        servers:
          - url: "https://100.100.1.1:443"
        serversTransport: tailscale-transport

  serversTransports:
    tailscale-transport:
      insecureSkipVerify: true
      serverName: 'mothership.{{ env "DOMAIN" }}'
      forwardingTimeouts:
        dialTimeout: 10s
        responseHeaderTimeout: 30s
        idleConnTimeout: 90s

# ===========================================
# TLS CONFIGURATION
# ===========================================
tls:
  options:
    default:
      minVersion: VersionTLS12
      sniStrict: true
      cipherSuites:
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_CHACHA20_POLY1305
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305
    modern:
      minVersion: VersionTLS13
      sniStrict: true
    short-host:
      minVersion: VersionTLS12
      sniStrict: false
