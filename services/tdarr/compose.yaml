networks:
  nexus:
    external: true
services:
  tdarr:
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    cap_drop:
      - ALL
    container_name: tdarr
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G
    devices:
      - /dev/dri
    environment:
      PGID: ${PGID:?PGID not set}
      PUID: ${PUID:?PUID not set}
      TZ: ${TZ:?TZ not set}
      UMASK_SET: "002"
      inContainer: "true"
      ffmpegVersion: "6"
      internalNode: "true"
      nodeName: InternalNode
      serverIP: 0.0.0.0
      serverPort: "8266"
      webUIPort: "8265"
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 60s
      test: [ "CMD-SHELL", "curl -f http://localhost:8265 || exit 1" ]
      timeout: 10s
    hostname: tdarr
    image: ghcr.io/haveagitgat/tdarr:latest
    labels:
      homepage.description: Media Transcoding Manager
      homepage.group: Media Automation
      homepage.href: https://tdarr.${DOMAIN:?DOMAIN not set}
      homepage.icon: tdarr
      homepage.name: Tdarr
      homepage.widget.type: tdarr
      homepage.widget.url: http://tdarr:8265
      traefik.http.routers.tdarr.middlewares: basic-auth@file
      traefik.http.routers.tdarr.rule: Host(`tdarr.${DOMAIN:?DOMAIN not set}`)
    networks:
      - nexus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    volumes:
      - ./data:/app/configs
      - ./server:/app/server
      - ./temp:/temp
      - ${MEDIA_PATH:?MEDIA_PATH not set}/movies:/media/movies
      - ${MEDIA_PATH:?MEDIA_PATH not set}/series:/media/series
