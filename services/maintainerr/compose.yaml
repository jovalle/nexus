networks:
  nexus:
    external: true
services:
  maintainerr:
    cap_drop:
      - ALL
    container_name: maintainerr
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    environment:
      TZ: ${TZ:?TZ not set}
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 60s
      test: [ "CMD-SHELL", "wget -q --spider http://127.0.0.1:6246/api/app/status || exit 1" ]
      timeout: 10s
    hostname: maintainerr
    image: ghcr.io/maintainerr/maintainerr
    labels:
      homepage.description: Plex Media Cleanup Manager
      homepage.group: Media Automation
      homepage.href: https://maintainerr.${DOMAIN:?DOMAIN not set}
      homepage.icon: maintainerr
      homepage.name: Maintainerr
      traefik.http.routers.maintainerr.middlewares: basic-auth@file
      traefik.http.routers.maintainerr.rule: Host(`maintainerr.${DOMAIN:?DOMAIN not set}`)
    networks:
      - nexus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    user: "${PUID:?PUID not set}:${PGID:?PGID not set}"
    volumes:
      - ./data:/opt/data
